services:
  init:
    build: .
    command: python scripts/docker_init.py
    environment:
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@ml-postgres:5432/ml_platform
      REDIS_URL: redis://ml-redis:6379/2
      MINIO_ENDPOINT: ml-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: canary-models
    networks:
      - ml-platform

  api:
    build: .
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@ml-postgres:5432/ml_platform
      REDIS_URL: redis://ml-redis:6379/2
      MINIO_ENDPOINT: ml-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: canary-models
      AUTO_ROLLBACK_ENABLED: "true"
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - ml-platform

  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8503 --server.address 0.0.0.0
    ports:
      - "8503:8503"
    environment:
      CANARY_API_URL: http://api:8001
      POSTGRES_URL: postgresql+asyncpg://postgres:postgres@ml-postgres:5432/ml_platform
      REDIS_URL: redis://ml-redis:6379/2
      MINIO_ENDPOINT: ml-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: canary-models
    depends_on:
      - api
    networks:
      - ml-platform

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      # Host 9091 -> container 9090 (host 9090 is taken by the shared infra's prometheus)
      - "9091:9090"
    depends_on:
      - api
    networks:
      - ml-platform

networks:
  ml-platform:
    external: true
    name: ml-platform-infra_default
